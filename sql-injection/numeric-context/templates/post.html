{% extends "layout.html" %} {% block content %}
<div class="w-full max-w-2xl flex-grow flex flex-col py-12 items-center">
    <div class="w-full space-y-6">
        <!-- User Hub -->
        <div
            class="glass mx-4 p-5 rounded-3xl border border-slate-200 shadow-xl shadow-black/[0.04] flex items-center justify-between bg-white/70"
        >
            <div class="flex items-center space-x-3">
                <div
                    class="h-10 w-10 rounded-full bg-[#007AFF] flex items-center justify-center text-white text-xs font-bold uppercase tracking-widest shadow-sm"
                >
                    {{ username[0] }}
                </div>
                <p class="text-sm font-bold text-slate-900 leading-none">
                    {{ username }}
                </p>
            </div>
            <div class="flex items-center space-x-3">
                <a
                    href="/"
                    class="text-[10px] font-bold uppercase tracking-widest text-slate-500 hover:text-[#007AFF] transition-colors px-3 py-1.5 rounded-xl border border-slate-200 bg-white shadow-sm"
                    >Feed</a
                >
                <a
                    href="/logout"
                    class="text-[10px] font-bold uppercase tracking-widest text-red-500/70 hover:text-red-700 transition-colors px-3 py-1.5 rounded-xl border border-red-100 bg-white shadow-sm"
                    >Logout</a
                >
            </div>
        </div>

        <!-- Single Post -->
        <div class="mx-4 pt-4 space-y-4">
            <div
                class="glass p-6 rounded-3xl border border-slate-200 bg-white/80 space-y-4 shadow-sm"
            >
                <div class="flex items-center justify-between px-2">
                    <h2
                        class="text-[11px] font-bold text-slate-400 italic font-medium"
                    >
                        Author: {{ post.author }}
                    </h2>
                    {% if post.author == username %}
                    <span
                        class="text-[9px] font-bold bg-[#007AFF]/10 text-[#007AFF] px-3 py-1 rounded-lg uppercase tracking-widest ring-1 ring-[#007AFF]/20"
                        >You</span
                    >
                    {% endif %}
                </div>

                <div
                    class="text-sm text-slate-900 leading-relaxed font-medium px-2"
                >
                    {{ post.content|safe }}
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center opacity-30 pt-12 pb-8 mt-auto shrink-0">
        <p
            class="text-[9px] font-bold uppercase tracking-[0.4em] text-slate-900 italic"
        >
            pwnpost
        </p>
    </footer>
</div>
{% endblock %}
