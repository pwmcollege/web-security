user root;
error_log /dev/stderr notice;

events {
    worker_connections 1024;
}

http {
    access_log off;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 0.0.0.0:80;
        server_name _;

        proxy_ssl_server_name on;
        proxy_request_buffering off;
        proxy_buffering off;

        location /__cdn__/ {
            proxy_pass https://cdn.internal/;
            proxy_set_header Host cdn.internal;

            sub_filter_once off;
            sub_filter_types text/css application/javascript text/javascript;
            sub_filter "url('/fonts/" "url('../fonts/";
        }

        location /fonts/ {
            proxy_pass https://cdn.internal/fonts/;
            proxy_set_header Host cdn.internal;
        }

        location / {
            proxy_pass https://10.0.13.37:443;
            proxy_http_version 1.1;

            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;

            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter 'href="/static/' 'href="static/';
            sub_filter 'src="/static/' 'src="static/';
            sub_filter 'href="https://cdn.internal/' 'href="__cdn__/';
            sub_filter 'src="https://cdn.internal/' 'src="__cdn__/';
        }
    }
}