<!doctype html>
<html lang="en" class="h-full">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Docs</title>
        <script src="https://cdn.internal/tailwind/tailwind.min.js"></script>
        <script src="https://cdn.internal/lucide/lucide.min.js"></script>
        <link rel="stylesheet" href="https://cdn.internal/fonts/inter.css" />
        <link rel="stylesheet" href="/static/style.css" />
    </head>

    <body
        class="min-h-full bg-white text-zinc-900 font-sans antialiased flex flex-col"
    >
        <header
            class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-zinc-100"
        >
            <div
                class="mx-auto max-w-[640px] h-[60px] px-5 flex items-center gap-2"
            >
                <i
                    data-lucide="file-text"
                    class="h-[21px] w-[21px] shrink-0 text-zinc-900"
                ></i>
                <a
                    href="/"
                    class="text-[19px] font-extrabold tracking-tight text-zinc-900 select-none"
                >
                    Docs<span class="text-zinc-300">.</span>
                </a>
            </div>
        </header>

        <main
            class="flex-grow w-full mx-auto max-w-[640px] sm:border-x border-zinc-100"
        >
            {% block content %}{% endblock %}
        </main>

        <script>
            lucide.createIcons();
        </script>
    </body>
</html>
