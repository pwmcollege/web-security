{% extends "layout.html" %} {% block content %}
<div
    class="w-full max-w-2xl flex-grow flex flex-col items-center py-12 animate-in slide-in-from-bottom duration-700"
>
    <div class="text-center px-4 mb-8 shrink-0">
        <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">
            Preview
        </h1>
        <p class="text-slate-500 text-sm mt-1 font-medium italic">
            Message Preview
        </p>
    </div>

    <div
        class="glass w-full max-w-xl p-10 rounded-3xl border border-slate-200 bg-white shadow-2xl space-y-10 mt-12 mb-24"
    >
        <div class="space-y-2.5">
            <h3
                class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center"
            >
                MESSAGE
            </h3>
            <div
                class="w-full min-h-[140px] flex items-center justify-center text-center bg-slate-50 border border-slate-200 rounded-2xl p-6 shadow-inner"
            >
                {% if msg %}
                <p class="text-sm font-medium text-slate-900 break-all">
                    {{ msg|safe }}
                </p>
                {% else %}
                <p
                    class="text-[11px] font-bold text-slate-300 uppercase italic"
                >
                    (none)
                </p>
                {% endif %}
            </div>
        </div>
    </div>

    <footer class="text-center opacity-30 pt-12 pb-8 mt-auto shrink-0">
        <p
            class="text-[9px] font-bold uppercase tracking-[0.4em] text-slate-900 italic"
        >
            pwnpost
        </p>
    </footer>
</div>
{% endblock %}
