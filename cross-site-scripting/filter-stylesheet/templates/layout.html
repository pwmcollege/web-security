<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ephemeral</title>
        <style nonce="{{ csp_nonce }}">
            :root {
                color-scheme: light;
                --bg: #f6f8fb;
                --card: #ffffff;
                --muted: #64748b;
                --border: #dbe3f0;
                --accent: #0f172a;
                --blue: #2563eb;
                --danger-bg: #fff1f2;
                --danger-border: #fecdd3;
                --danger-text: #be123c;
                --shadow: 0 22px 50px rgba(15, 23, 42, 0.08);
                --inner: inset 0 1px 0 rgba(255, 255, 255, 0.8);
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                background:
                    radial-gradient(circle at top right, rgba(37, 99, 235, 0.10), transparent 22%),
                    linear-gradient(180deg, #fbfdff 0%, var(--bg) 100%);
                color: var(--accent);
                font-family: "SF Pro Display", "Segoe UI", sans-serif;
            }

            .shell {
                width: min(100%, 960px);
                margin: 0 auto;
                padding: 32px 20px 64px;
            }

            .nav {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 14px 20px;
                border: 1px solid rgba(255, 255, 255, 0.75);
                border-radius: 20px;
                background: rgba(255, 255, 255, 0.82);
                backdrop-filter: blur(16px);
                box-shadow: 0 14px 30px rgba(15, 23, 42, 0.07);
            }

            .brand {
                margin: 0;
                font-size: 1.1rem;
                font-weight: 800;
                letter-spacing: -0.04em;
            }

            .tag {
                margin: 0;
                font-size: 0.7rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.16em;
                color: var(--muted);
            }

            main {
                padding-top: 56px;
            }
        </style>
    </head>
    <body>
        <div class="shell">
            <nav class="nav">
                <p class="brand">pwnpost</p>
                <p class="tag">Ephemeral</p>
            </nav>
            <main>{% block content %}{% endblock %}</main>
        </div>
    </body>
</html>
