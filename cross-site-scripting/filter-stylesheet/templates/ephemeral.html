{% extends "layout.html" %}
{% block content %}
<style nonce="{{ csp_nonce }}">
    .hero {
        text-align: center;
        margin-bottom: 30px;
    }

    .title {
        margin: 0;
        font-size: clamp(2.4rem, 5vw, 3.3rem);
        font-weight: 900;
        letter-spacing: -0.06em;
    }

    .subtitle {
        margin: 8px 0 0;
        color: #64748b;
        font-size: 0.95rem;
        font-style: italic;
    }

    .card {
        width: min(100%, 720px);
        margin: 0 auto;
        padding: 36px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 30px;
        box-shadow: var(--shadow), var(--inner);
    }

    .section-label {
        margin: 0 0 12px;
        text-align: center;
        font-size: 0.68rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.24em;
        color: #94a3b8;
    }

    .message-box {
        min-height: 148px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #f8fafc;
        border: 1px solid #dbe3f0;
        border-radius: 24px;
        box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.03);
        text-align: center;
    }

    .message {
        font-size: 0.95rem;
        font-weight: 500;
        line-height: 1.65;
        color: #0f172a;
    }

    .empty {
        margin: 0;
        color: #cbd5e1;
        font-size: 0.72rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-style: italic;
    }

    .error {
        width: 100%;
        padding: 16px 18px;
        border-radius: 20px;
        border: 1px solid var(--danger-border);
        background: var(--danger-bg);
        color: var(--danger-text);
        font-size: 0.78rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.16em;
    }

    .divider {
        height: 1px;
        margin: 30px 0;
        background: #eef2f7;
    }

    .share {
        margin-top: 18px;
    }

    .share-field,
    .message-input {
        width: 100%;
        padding: 15px 18px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: #f8fafc;
        color: #475569;
        font: inherit;
        box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.03);
    }

    .share-field[readonly] {
        cursor: default;
    }

    .form {
        display: grid;
        gap: 18px;
    }

    .section-label-left {
        text-align: left;
    }

    .button {
        border: 0;
        border-radius: 20px;
        padding: 18px 20px;
        background: linear-gradient(180deg, #3b82f6 0%, var(--blue) 100%);
        color: #ffffff;
        font: inherit;
        font-size: 0.78rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        cursor: pointer;
        box-shadow: 0 18px 30px rgba(37, 99, 235, 0.22);
    }
</style>
<div class="hero">
    <h1 class="title">Ephemeral</h1>
    <p class="subtitle">Ephemeral Message</p>
</div>
<div class="card">
    <p class="section-label">Message</p>
    <div class="message-box">
        {% if banned %}
        <div class="error">Message banned.</div>
        {% elif msg %}
        <div class="message">{{ msg|safe }}</div>
        {% else %}
        <p class="empty">(none)</p>
        {% endif %}
    </div>

    {% if msg %}
    <div class="share">
        <p class="section-label">Shareable URL</p>
        <input class="share-field" type="text" readonly value="{{ share_url }}" />
    </div>
    {% endif %}

    <div class="divider"></div>

    <form class="form" method="GET" action="/">
        <p class="section-label section-label-left">Craft Message</p>
        <input
            class="message-input"
            type="text"
            name="msg"
            required
            placeholder="Enter message content..."
        />
        <button class="button" type="submit">Craft Message</button>
    </form>
</div>
{% endblock %}
