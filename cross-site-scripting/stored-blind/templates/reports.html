{% extends "layout.html" %} {% block content %}
<div class="w-full max-w-2xl flex-grow flex flex-col py-12 items-center">
    <div class="text-center px-4 mb-8 shrink-0">
        <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">
            pwnpost
        </h1>
    </div>

    <div class="w-full space-y-6">
        <div
            class="glass mx-4 p-5 rounded-3xl border border-slate-200 shadow-xl shadow-black/[0.04] flex items-center justify-between bg-white/70"
        >
            <div class="flex items-center space-x-3">
                <div
                    class="h-10 w-10 rounded-full bg-[#007AFF] flex items-center justify-center text-white text-xs font-bold uppercase tracking-widest shadow-sm"
                >
                    A
                </div>
                <p class="text-sm font-bold text-slate-900 leading-none">
                    admin
                </p>
            </div>
            <div class="flex items-center space-x-3">
                <a
                    href="/"
                    class="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-[#007AFF] transition-colors px-3 py-1.5 rounded-xl border border-slate-100 bg-white shadow-sm"
                    >Feed</a
                >
                <a
                    href="/logout"
                    class="text-[10px] font-bold uppercase tracking-widest text-red-500/70 hover:text-red-700 transition-colors px-3 py-1.5 rounded-xl border border-red-100 bg-white shadow-sm"
                    >Logout</a
                >
            </div>
        </div>

        {% if reports %}
        <div class="mx-4 pt-4 space-y-4">
            {% for report in reports %}
            <div
                class="glass p-6 rounded-3xl border border-slate-200 bg-white/80 space-y-4 shadow-sm transition-all hover:border-[#007AFF]/30"
            >
                <div class="flex items-center justify-between px-2">
                    <h2
                        class="text-[11px] font-bold text-slate-400 italic font-medium"
                    >
                        From: {{ report.author }}
                    </h2>
                    <span
                        class="text-[9px] font-bold bg-amber-50 text-amber-600 px-3 py-1 rounded-lg uppercase tracking-widest ring-1 ring-amber-200/60"
                        >Bug Report</span
                    >
                </div>
                <div
                    class="text-sm text-slate-900 leading-relaxed font-medium px-2"
                >
                    {{ report.content|safe }}
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div
            class="glass mx-4 rounded-3xl p-12 border border-slate-200 bg-white/70 text-center"
        >
            <p class="text-[11px] font-bold text-slate-300 uppercase italic">
                No reports yet
            </p>
        </div>
        {% endif %}
    </div>

</div>
{% endblock %}
